server {
    listen 80;
    server_name brinkamaisfestas.sandlj.com.br;

    # Redirecionar HTTP -> HTTPS (após configurar o Certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name brinkamaisfestas.sandlj.com.br;

    # Certificado SSL - gerado pelo Certbot (será preenchido automaticamente)
    ssl_certificate     /etc/letsencrypt/live/brinkamaisfestas.sandlj.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brinkamaisfestas.sandlj.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/brinkamaisfestas;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # React SPA - redireciona tudo para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
